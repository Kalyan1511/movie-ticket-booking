<!DOCTYPE html>
<html>
<head>
    <title>Movie Ticket Booking</title>

    <style>
        body {
            font-family: Arial;
            background-color: #141414;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .date-filter {
            margin: 20px;
        }

        .slot-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .slot {
            border-radius: 12px;
            padding: 20px;
            margin: 15px;
            width: 250px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .available {
            background-color: #1f8f3a;
        }

        .booked {
            background-color: #b02a37;
        }

        input {
            margin: 5px;
            padding: 5px;
            width: 90%;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .book-btn {
            background-color: black;
            color: white;
        }

        .cancel-btn {
            background-color: white;
            color: black;
        }

        a {
            color: #00d4ff;
            text-decoration: none;
        }

    </style>
</head>

<body>

    <h1>🎬 Movie Ticket Booking</h1>

    <!-- DATE FILTER -->
    <div class="date-filter">
        <form method="GET">
            <input type="date" name="date" value="{{ selected_date }}">
            <button type="submit">Filter</button>
        </form>
    </div>

    <a href="/booked/">📄 View Booked Tickets</a>

    <div class="slot-container">

        {% for slot in slots %}
        <div class="slot {% if slot.id in booked_slots %}booked{% else %}available{% endif %}">

            <h3>🎟 Show Time: {{ slot.time }}</h3>
            <p>🎬 Movie: Avengers</p>
            <p>📍 Screen 1</p>

            {% if slot.id in booked_slots %}
                <p><strong>Booked</strong></p>

                <form method="POST" action="/unbook/{{ slot.id }}/">
                    {% csrf_token %}
                    <button class="cancel-btn">Cancel Ticket</button>
                </form>

            {% else %}
                <form method="POST" action="/book/{{ slot.id }}/">
                    {% csrf_token %}
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <button class="book-btn">Book Ticket</button>
                </form>
            {% endif %}

        </div>
        {% endfor %}

    </div>

</body>
</html>
